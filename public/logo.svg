<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44">
  <!-- ═══ Magazine icon (left) ═══ -->
  <!-- Background square -->
  <rect width="44" height="44" rx="8" fill="#15120e"/>

  <!-- Left page — warm paper -->
  <rect x="4" y="6" width="15.5" height="32" rx="2" fill="#f0ece5"/>
  <!-- Text lines -->
  <rect x="6.5" y="12"   width="10" height="2"   rx="1" fill="#c8bfb4"/>
  <rect x="6.5" y="17"   width="10" height="2"   rx="1" fill="#c8bfb4"/>
  <rect x="6.5" y="22"   width="7"  height="2"   rx="1" fill="#c8bfb4"/>
  <rect x="6.5" y="27"   width="9"  height="2"   rx="1" fill="#c8bfb4"/>

  <!-- Spine -->
  <rect x="19" y="6" width="5" height="32" fill="#2d261f"/>
  <rect x="20" y="6" width="1.5" height="32" fill="#3d342a" opacity="0.7"/>

  <!-- Right page — accent orange -->
  <rect x="23.5" y="6" width="16.5" height="32" rx="2" fill="#c0540a"/>
  <rect x="23.5" y="6" width="16.5" height="5"  rx="2" fill="rgba(255,255,255,0.09)"/>

  <!-- D glyph — path based -->
  <path d="M28 14 L31.5 14 Q38.5 14 38.5 22 Q38.5 30 31.5 30 L28 30 Z
           M30.3 16.2 L31.5 16.2 Q36 16.2 36 22 Q36 27.8 31.5 27.8 L30.3 27.8 Z"
        fill="rgba(255,255,255,0.93)"/>

  <!-- ═══ Brand text (right) ═══ -->
  <!-- "Dergi" serif -->
  <text x="54" y="25"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="700"
        font-size="18"
        fill="#1a1714"
        letter-spacing="0.5">Dergi</text>

  <!-- "ARŞİVİ" small caps / spaced -->
  <text x="55.5" y="37"
        font-family="'Inter',system-ui,sans-serif"
        font-weight="600"
        font-size="8.5"
        fill="#8a8278"
        letter-spacing="3">ARŞİVİ</text>
</svg>
