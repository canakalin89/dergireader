<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Okul Dergilerimiz</title>
  <meta name="description" content="Okulumuzun dijital dergi arşivi" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css?v=5" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">
        <span class="brand-mark">D</span>
        <div class="brand-text">
          <span class="brand-name">Dergi Arşivi</span>
          <span class="brand-sub">Dijital Kütüphane</span>
        </div>
      </a>
      <div class="header-right">
        <div class="stats-bar" id="statsBar">
          <span><strong id="statCount">—</strong> yayın</span>
          <span class="sep">·</span>
          <span id="statYears">—</span>
          <span class="sep sep3">·</span>
          <span id="statExtra">arşivde</span>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Temayı değiştir">🌙</button>
        <a class="admin-link" href="/admin/">Yönetim</a>
      </div>
    </div>
  </header>

  <div class="error-banner" id="errorBanner">
    ⚠ Dergiler yüklenirken hata oluştu. Sayfayı yenileyin.
  </div>

  <div class="filter-row">
    <div class="filter-inner">
      <span class="filter-label">Filtrele</span>
      <select class="filter-select" id="filterYear" aria-label="Yıla göre filtrele">
        <option value="">Tüm yıllar</option>
      </select>
      <button class="filter-reset" id="filterReset">✕</button>
    </div>
  </div>

  <main class="gallery-container" role="main">
    <div class="gallery-grid" id="galleryGrid">
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
      <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-text"></div><div class="skeleton-text short"></div></div>
    </div>
  </main>

  <footer class="site-footer">
    <span>© <span id="yr"></span> Dijital Dergi Arşivi</span>
  </footer>
  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/js/gallery.js?v=6"></script>
</body>
</html>
