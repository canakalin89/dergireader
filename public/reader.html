<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dergi Okuyucu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/reader.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
</head>
<body>

  <!-- Araç çubuğu -->
  <div class="reader-toolbar" id="toolbar">
    <button class="btn-back" id="btnBack" title="Galeriye dön">← Geri</button>
    <div class="toolbar-sep"></div>
    <span class="toolbar-title" id="toolbarTitle">Yükleniyor…</span>
    <div class="toolbar-spacer"></div>
    <button class="tb-btn" id="btnPrev" disabled title="Önceki sayfa (←)">‹</button>
    <span class="page-info"><span id="pageInput">1</span> / <span id="totalPages">—</span></span>
    <button class="tb-btn" id="btnNext" disabled title="Sonraki sayfa (→)">›</button>
    <div class="toolbar-sep"></div>
    <button class="tb-btn" id="btnFullscreen" title="Tam ekran (F)">⛶</button>
    <a class="tb-btn" id="btnDownload" href="#" download title="PDF İndir">⬇</a>
  </div>

  <!-- Yükleme ekranı -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader-content">
      <div class="book-loader">
        <div class="book-page"></div>
        <div class="book-page"></div>
        <div class="book-page"></div>
      </div>
      <span id="loadingMsg">PDF yükleniyor…</span>
      <div class="load-progress" id="loadProgress">
        <div class="load-progress-fill" id="loadProgressFill"></div>
      </div>
      <button class="btn-back loader-back" onclick="history.length>1?history.back():location.href='/'">← Vazgeç</button>
    </div>
  </div>

  <!-- Hata ekranı -->
  <div class="reader-error" id="readerError" style="display:none">
    <div class="err-icon">⚠️</div>
    <h3>PDF açılamadı</h3>
    <p id="errorMsg">Bir hata oluştu.</p>
    <button class="btn-back" onclick="history.back()">← Geri dön</button>
  </div>

  <!-- Drive fallback (proxy başarısız olursa) -->
  <div class="drive-fallback" id="driveFallback" style="display:none">
    <div class="fallback-bar">
      <span class="fallback-info">📖 PDF büyük olduğu için Google Drive önizlemesi açıldı</span>
      <small id="fallbackError"></small>
    </div>
    <iframe id="driveFrame" class="drive-frame"></iframe>
  </div>

  <!-- Flipbook alanı -->
  <div class="flipbook-scene" id="flipbookScene">
    <div id="flipbook"></div>
    <!-- Sol/sağ tıklama bölgeleri (mobil) -->
    <button class="nav-zone nav-zone-left" id="navLeft" aria-label="Önceki sayfa"></button>
    <button class="nav-zone nav-zone-right" id="navRight" aria-label="Sonraki sayfa"></button>
  </div>

  <!-- Okuma ilerleme çubuğu -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Sayfa zoom modal -->
  <div class="zoom-overlay" id="zoomOverlay" style="display:none">
    <canvas id="zoomCanvas"></canvas>
    <button class="zoom-close" id="zoomClose">✕</button>
    <span class="zoom-hint">Kapatmak için tıklayın veya ESC</span>
  </div>

  <script src="/js/reader.js"></script>
</body>
</html>
